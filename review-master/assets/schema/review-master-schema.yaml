tables:
  - name: runtime_language_context
    sql: |
      CREATE TABLE IF NOT EXISTS runtime_language_context (
          id INTEGER PRIMARY KEY CHECK (id = 1),
          document_language TEXT NOT NULL DEFAULT '',
          working_language TEXT NOT NULL DEFAULT '',
          manuscript_detected_language TEXT NOT NULL DEFAULT '',
          review_comments_detected_language TEXT NOT NULL DEFAULT '',
          prompt_detected_language TEXT NOT NULL DEFAULT '',
          document_language_source TEXT NOT NULL DEFAULT '' CHECK (document_language_source IN ('', 'manuscript', 'review_comments', 'user_override')),
          working_language_source TEXT NOT NULL DEFAULT '' CHECK (working_language_source IN ('', 'prompt', 'user_override')),
          languages_confirmed TEXT NOT NULL DEFAULT 'no' CHECK (languages_confirmed IN ('yes', 'no'))
      )
  - name: manuscript_summary
    sql: |
      CREATE TABLE IF NOT EXISTS manuscript_summary (
          id INTEGER PRIMARY KEY CHECK (id = 1),
          main_entry TEXT NOT NULL DEFAULT '',
          project_shape TEXT NOT NULL DEFAULT '' CHECK (project_shape IN ('', 'single_tex', 'latex_project')),
          high_risk_areas TEXT NOT NULL DEFAULT ''
      )
  - name: manuscript_sections
    sql: |
      CREATE TABLE IF NOT EXISTS manuscript_sections (
          section_id TEXT PRIMARY KEY,
          section_title TEXT NOT NULL DEFAULT '',
          purpose_in_manuscript TEXT NOT NULL DEFAULT '',
          key_files_or_locations TEXT NOT NULL DEFAULT ''
      )
  - name: manuscript_claims
    sql: |
      CREATE TABLE IF NOT EXISTS manuscript_claims (
          claim_id TEXT PRIMARY KEY,
          core_claim TEXT NOT NULL DEFAULT '',
          main_evidence TEXT NOT NULL DEFAULT '',
          supporting_section_ids TEXT NOT NULL DEFAULT '',
          risk_level TEXT NOT NULL DEFAULT ''
      )
  - name: raw_review_threads
    sql: |
      CREATE TABLE IF NOT EXISTS raw_review_threads (
          thread_id TEXT PRIMARY KEY,
          reviewer_id TEXT NOT NULL,
          thread_order INTEGER NOT NULL,
          source_type TEXT NOT NULL CHECK (source_type IN ('reviewer_comment', 'editor_comment')),
          original_text TEXT NOT NULL,
          normalized_summary TEXT NOT NULL
      )
  - name: atomic_comments
    sql: |
      CREATE TABLE IF NOT EXISTS atomic_comments (
          comment_id TEXT PRIMARY KEY,
          comment_order INTEGER NOT NULL,
          canonical_summary TEXT NOT NULL,
          required_action TEXT NOT NULL
      )
  - name: raw_thread_atomic_links
    sql: |
      CREATE TABLE IF NOT EXISTS raw_thread_atomic_links (
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          link_order INTEGER NOT NULL,
          PRIMARY KEY (thread_id, comment_id)
      )
  - name: atomic_comment_source_spans
    sql: |
      CREATE TABLE IF NOT EXISTS atomic_comment_source_spans (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          excerpt_text TEXT NOT NULL,
          note TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, thread_id)
      )
  - name: review_comment_source_documents
    sql: |
      CREATE TABLE IF NOT EXISTS review_comment_source_documents (
          source_document_id TEXT PRIMARY KEY,
          source_kind TEXT NOT NULL CHECK (source_kind IN ('review_comments_source', 'editor_letter_source')),
          document_order INTEGER NOT NULL,
          source_label TEXT NOT NULL DEFAULT '',
          source_path TEXT NOT NULL DEFAULT '',
          original_text TEXT NOT NULL
      )
  - name: raw_thread_source_spans
    sql: |
      CREATE TABLE IF NOT EXISTS raw_thread_source_spans (
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          source_document_id TEXT NOT NULL REFERENCES review_comment_source_documents(source_document_id) ON DELETE CASCADE,
          span_order INTEGER NOT NULL,
          span_role TEXT NOT NULL CHECK (span_role IN ('primary', 'supporting', 'duplicate_filtered')),
          start_offset INTEGER NOT NULL CHECK (start_offset >= 0),
          end_offset INTEGER NOT NULL CHECK (end_offset > start_offset),
          span_text TEXT NOT NULL,
          PRIMARY KEY (thread_id, source_document_id, span_order)
      )
  - name: review_comment_coverage_segments
    sql: |
      CREATE TABLE IF NOT EXISTS review_comment_coverage_segments (
          source_document_id TEXT NOT NULL REFERENCES review_comment_source_documents(source_document_id) ON DELETE CASCADE,
          segment_order INTEGER NOT NULL,
          coverage_status TEXT NOT NULL CHECK (coverage_status IN ('covered', 'uncovered')),
          segment_text TEXT NOT NULL,
          thread_id TEXT REFERENCES raw_review_threads(thread_id) ON DELETE SET NULL,
          PRIMARY KEY (source_document_id, segment_order)
      )
  - name: review_comment_coverage_segment_comment_links
    sql: |
      CREATE TABLE IF NOT EXISTS review_comment_coverage_segment_comment_links (
          source_document_id TEXT NOT NULL,
          segment_order INTEGER NOT NULL,
          link_order INTEGER NOT NULL,
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          PRIMARY KEY (source_document_id, segment_order, link_order),
          FOREIGN KEY (source_document_id, segment_order)
              REFERENCES review_comment_coverage_segments(source_document_id, segment_order)
              ON DELETE CASCADE
      )
  - name: atomic_comment_state
    sql: |
      CREATE TABLE IF NOT EXISTS atomic_comment_state (
          comment_id TEXT PRIMARY KEY REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          status TEXT NOT NULL CHECK (status IN ('todo', 'blocked', 'ready', 'in_progress', 'done')),
          priority TEXT NOT NULL CHECK (priority IN ('high', 'medium', 'low')),
          evidence_gap TEXT NOT NULL CHECK (evidence_gap IN ('yes', 'no')),
          user_confirmation_needed TEXT NOT NULL CHECK (user_confirmation_needed IN ('yes', 'no')),
          next_action TEXT NOT NULL DEFAULT ''
      )
  - name: atomic_comment_target_locations
    sql: |
      CREATE TABLE IF NOT EXISTS atomic_comment_target_locations (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          location_order INTEGER NOT NULL,
          target_location TEXT NOT NULL,
          location_role TEXT NOT NULL CHECK (location_role IN ('primary', 'supporting')),
          PRIMARY KEY (comment_id, location_order)
      )
  - name: atomic_comment_analysis_links
    sql: |
      CREATE TABLE IF NOT EXISTS atomic_comment_analysis_links (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          analysis_order INTEGER NOT NULL,
          manuscript_claim_or_section TEXT NOT NULL DEFAULT '',
          existing_evidence TEXT NOT NULL DEFAULT '',
          gap_summary TEXT NOT NULL DEFAULT '',
          dependency_comment_id TEXT REFERENCES atomic_comments(comment_id) ON DELETE SET NULL,
          PRIMARY KEY (comment_id, analysis_order)
      )
  - name: strategy_cards
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_cards (
          comment_id TEXT PRIMARY KEY REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          proposed_stance TEXT NOT NULL DEFAULT '',
          stance_rationale TEXT NOT NULL DEFAULT ''
      )
  - name: strategy_card_actions
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_card_actions (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          action_order INTEGER NOT NULL,
          manuscript_change TEXT NOT NULL DEFAULT '',
          expected_response_letter_effect TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, action_order)
      )
  - name: strategy_action_target_locations
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_action_target_locations (
          comment_id TEXT NOT NULL,
          action_order INTEGER NOT NULL,
          location_order INTEGER NOT NULL,
          target_location TEXT NOT NULL,
          PRIMARY KEY (comment_id, action_order, location_order),
          FOREIGN KEY (comment_id, action_order)
              REFERENCES strategy_card_actions(comment_id, action_order)
              ON DELETE CASCADE
      )
  - name: strategy_card_evidence_items
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_card_evidence_items (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          evidence_order INTEGER NOT NULL,
          required_material TEXT NOT NULL DEFAULT '',
          available_now TEXT NOT NULL CHECK (available_now IN ('yes', 'no')),
          gap_note TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, evidence_order)
      )
  - name: strategy_card_pending_confirmations
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_card_pending_confirmations (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          confirmation_order INTEGER NOT NULL,
          message TEXT NOT NULL,
          PRIMARY KEY (comment_id, confirmation_order)
      )
  - name: strategy_action_manuscript_execution_items
    sql: |
      CREATE TABLE IF NOT EXISTS strategy_action_manuscript_execution_items (
          comment_id TEXT NOT NULL,
          action_order INTEGER NOT NULL,
          item_order INTEGER NOT NULL,
          category TEXT NOT NULL CHECK (category IN ('modification_strategy', 'rewrite_polish', 'text_add_modify_delete', 'figure_update', 'data_supplement')),
          content_text TEXT NOT NULL DEFAULT '',
          rationale TEXT NOT NULL DEFAULT '',
          target_scope_note TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, action_order, item_order),
          FOREIGN KEY (comment_id, action_order)
              REFERENCES strategy_card_actions(comment_id, action_order)
              ON DELETE CASCADE
      )
  - name: comment_response_drafts
    sql: |
      CREATE TABLE IF NOT EXISTS comment_response_drafts (
          comment_id TEXT PRIMARY KEY REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          draft_text TEXT NOT NULL DEFAULT '',
          rationale TEXT NOT NULL DEFAULT ''
      )
  - name: supplement_suggestion_items
    sql: |
      CREATE TABLE IF NOT EXISTS supplement_suggestion_items (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          suggestion_order INTEGER NOT NULL,
          analysis_order INTEGER,
          request_summary TEXT NOT NULL DEFAULT '',
          request_recommendation TEXT NOT NULL DEFAULT '',
          status TEXT NOT NULL CHECK (status IN ('provisional', 'confirmed', 'linked', 'satisfied', 'dismissed')),
          PRIMARY KEY (comment_id, suggestion_order)
      )
  - name: supplement_suggestion_intake_links
    sql: |
      CREATE TABLE IF NOT EXISTS supplement_suggestion_intake_links (
          comment_id TEXT NOT NULL,
          suggestion_order INTEGER NOT NULL,
          round_id TEXT NOT NULL,
          file_path TEXT NOT NULL,
          link_note TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, suggestion_order, round_id, file_path),
          FOREIGN KEY (comment_id, suggestion_order)
              REFERENCES supplement_suggestion_items(comment_id, suggestion_order)
              ON DELETE CASCADE,
          FOREIGN KEY (round_id, file_path)
              REFERENCES supplement_intake_items(round_id, file_path)
              ON DELETE CASCADE
      )
  - name: supplement_intake_items
    sql: |
      CREATE TABLE IF NOT EXISTS supplement_intake_items (
          round_id TEXT NOT NULL,
          file_path TEXT NOT NULL,
          concern_summary TEXT NOT NULL DEFAULT '',
          decision TEXT NOT NULL DEFAULT '' CHECK (decision IN ('', 'accepted', 'rejected')),
          decision_rationale TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (round_id, file_path)
      )
  - name: supplement_landing_links
    sql: |
      CREATE TABLE IF NOT EXISTS supplement_landing_links (
          round_id TEXT NOT NULL,
          file_path TEXT NOT NULL,
          comment_id TEXT NOT NULL,
          action_order INTEGER NOT NULL,
          location_order INTEGER NOT NULL,
          planned_usage_note TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (round_id, file_path, comment_id, action_order, location_order),
          FOREIGN KEY (round_id, file_path)
              REFERENCES supplement_intake_items(round_id, file_path)
              ON DELETE CASCADE,
          FOREIGN KEY (comment_id, action_order, location_order)
              REFERENCES strategy_action_target_locations(comment_id, action_order, location_order)
              ON DELETE CASCADE
      )
  - name: comment_completion_status
    sql: |
      CREATE TABLE IF NOT EXISTS comment_completion_status (
          comment_id TEXT PRIMARY KEY REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          manuscript_execution_items_done TEXT NOT NULL CHECK (manuscript_execution_items_done IN ('yes', 'no')),
          response_draft_done TEXT NOT NULL CHECK (response_draft_done IN ('yes', 'no')),
          evidence_gap_closed TEXT NOT NULL CHECK (evidence_gap_closed IN ('yes', 'no')),
          user_strategy_confirmed TEXT NOT NULL CHECK (user_strategy_confirmed IN ('yes', 'no')),
          one_to_one_link_checked TEXT NOT NULL CHECK (one_to_one_link_checked IN ('yes', 'no')),
          export_ready TEXT NOT NULL CHECK (export_ready IN ('yes', 'no'))
      )
  - name: comment_blockers
    sql: |
      CREATE TABLE IF NOT EXISTS comment_blockers (
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          blocker_order INTEGER NOT NULL,
          message TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, blocker_order)
      )
  - name: response_thread_resolution_links
    sql: |
      CREATE TABLE IF NOT EXISTS response_thread_resolution_links (
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          response_order INTEGER NOT NULL,
          response_role TEXT NOT NULL CHECK (response_role IN ('primary', 'supporting', 'merged_duplicate')),
          PRIMARY KEY (thread_id, comment_id)
      )
  - name: style_profiles
    sql: |
      CREATE TABLE IF NOT EXISTS style_profiles (
          profile_target TEXT PRIMARY KEY CHECK (profile_target IN ('manuscript', 'response_letter')),
          profile_summary TEXT NOT NULL DEFAULT '',
          anti_ai_focus TEXT NOT NULL DEFAULT ''
      )
  - name: style_profile_rules
    sql: |
      CREATE TABLE IF NOT EXISTS style_profile_rules (
          profile_target TEXT NOT NULL REFERENCES style_profiles(profile_target) ON DELETE CASCADE,
          rule_order INTEGER NOT NULL,
          rule_type TEXT NOT NULL CHECK (rule_type IN ('do', 'dont', 'anti_ai', 'tone')),
          rule_text TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (profile_target, rule_order)
      )
  - name: workspace_manuscript_copies
    sql: |
      CREATE TABLE IF NOT EXISTS workspace_manuscript_copies (
          copy_role TEXT PRIMARY KEY CHECK (copy_role IN ('source_snapshot', 'working_manuscript')),
          source_kind TEXT NOT NULL CHECK (source_kind IN ('single_tex_file', 'project_directory')),
          source_root TEXT NOT NULL DEFAULT '',
          copy_root TEXT NOT NULL DEFAULT '',
          main_entry_relative_path TEXT NOT NULL DEFAULT ''
      )
  - name: revision_plan_actions
    sql: |
      CREATE TABLE IF NOT EXISTS revision_plan_actions (
          plan_action_id TEXT PRIMARY KEY,
          plan_order INTEGER NOT NULL,
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          action_order INTEGER,
          execution_category TEXT NOT NULL DEFAULT '',
          title TEXT NOT NULL DEFAULT '',
          objective TEXT NOT NULL DEFAULT '',
          suggested_change TEXT NOT NULL DEFAULT '',
          evidence_requirement TEXT NOT NULL DEFAULT '',
          status TEXT NOT NULL CHECK (status IN ('todo', 'blocked', 'in_progress', 'completed', 'dismissed'))
      )
  - name: revision_plan_dependencies
    sql: |
      CREATE TABLE IF NOT EXISTS revision_plan_dependencies (
          plan_action_id TEXT NOT NULL REFERENCES revision_plan_actions(plan_action_id) ON DELETE CASCADE,
          depends_on_plan_action_id TEXT NOT NULL REFERENCES revision_plan_actions(plan_action_id) ON DELETE CASCADE,
          PRIMARY KEY (plan_action_id, depends_on_plan_action_id)
      )
  - name: revision_action_logs
    sql: |
      CREATE TABLE IF NOT EXISTS revision_action_logs (
          log_id TEXT PRIMARY KEY,
          log_order INTEGER NOT NULL,
          status TEXT NOT NULL CHECK (status IN ('draft', 'completed', 'cancelled')),
          operator_role TEXT NOT NULL CHECK (operator_role IN ('agent', 'user', 'collaborative')),
          summary TEXT NOT NULL DEFAULT '',
          change_note TEXT NOT NULL DEFAULT '',
          response_note TEXT NOT NULL DEFAULT '',
          created_at TEXT NOT NULL DEFAULT ''
      )
  - name: revision_action_log_plan_links
    sql: |
      CREATE TABLE IF NOT EXISTS revision_action_log_plan_links (
          log_id TEXT NOT NULL REFERENCES revision_action_logs(log_id) ON DELETE CASCADE,
          plan_action_id TEXT NOT NULL REFERENCES revision_plan_actions(plan_action_id) ON DELETE CASCADE,
          PRIMARY KEY (log_id, plan_action_id)
      )
  - name: revision_action_log_thread_links
    sql: |
      CREATE TABLE IF NOT EXISTS revision_action_log_thread_links (
          log_id TEXT NOT NULL REFERENCES revision_action_logs(log_id) ON DELETE CASCADE,
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          PRIMARY KEY (log_id, thread_id)
      )
  - name: revision_action_log_file_diffs
    sql: |
      CREATE TABLE IF NOT EXISTS revision_action_log_file_diffs (
          log_id TEXT NOT NULL REFERENCES revision_action_logs(log_id) ON DELETE CASCADE,
          file_order INTEGER NOT NULL,
          relative_path TEXT NOT NULL DEFAULT '',
          change_kind TEXT NOT NULL CHECK (change_kind IN ('modified', 'added', 'deleted')),
          diff_excerpt TEXT NOT NULL DEFAULT '',
          before_excerpt TEXT NOT NULL DEFAULT '',
          after_excerpt TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (log_id, file_order)
      )
  - name: working_copy_file_state
    sql: |
      CREATE TABLE IF NOT EXISTS working_copy_file_state (
          relative_path TEXT PRIMARY KEY,
          snapshot_sha256 TEXT NOT NULL DEFAULT '',
          last_audited_sha256 TEXT NOT NULL DEFAULT '',
          current_sha256 TEXT NOT NULL DEFAULT '',
          last_log_id TEXT REFERENCES revision_action_logs(log_id) ON DELETE SET NULL
      )
  - name: action_copy_variants
    sql: |
      CREATE TABLE IF NOT EXISTS action_copy_variants (
          comment_id TEXT NOT NULL,
          action_order INTEGER NOT NULL,
          location_order INTEGER NOT NULL,
          variant_label TEXT NOT NULL CHECK (variant_label IN ('v1', 'v2', 'v3')),
          variant_text TEXT NOT NULL DEFAULT '',
          rationale TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (comment_id, action_order, location_order, variant_label),
          FOREIGN KEY (comment_id, action_order, location_order)
              REFERENCES strategy_action_target_locations(comment_id, action_order, location_order)
              ON DELETE CASCADE
      )
  - name: selected_action_copy_variants
    sql: |
      CREATE TABLE IF NOT EXISTS selected_action_copy_variants (
          comment_id TEXT NOT NULL,
          action_order INTEGER NOT NULL,
          location_order INTEGER NOT NULL,
          variant_label TEXT NOT NULL CHECK (variant_label IN ('v1', 'v2', 'v3')),
          PRIMARY KEY (comment_id, action_order, location_order),
          FOREIGN KEY (comment_id, action_order, location_order, variant_label)
              REFERENCES action_copy_variants(comment_id, action_order, location_order, variant_label)
              ON DELETE CASCADE
      )
  - name: response_thread_rows
    sql: |
      CREATE TABLE IF NOT EXISTS response_thread_rows (
          thread_id TEXT PRIMARY KEY REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          response_resolution_kind TEXT NOT NULL DEFAULT 'revision_backed' CHECK (response_resolution_kind IN ('revision_backed', 'response_only_resolution')),
          original_comment TEXT NOT NULL DEFAULT '',
          modification_scope TEXT NOT NULL DEFAULT '',
          key_revision_excerpt TEXT NOT NULL DEFAULT '',
          response_explanation TEXT NOT NULL DEFAULT '',
          latex_excerpt TEXT NOT NULL DEFAULT '',
          latex_response_text TEXT NOT NULL DEFAULT ''
      )
  - name: response_thread_action_log_links
    sql: |
      CREATE TABLE IF NOT EXISTS response_thread_action_log_links (
          thread_id TEXT NOT NULL REFERENCES raw_review_threads(thread_id) ON DELETE CASCADE,
          log_id TEXT NOT NULL REFERENCES revision_action_logs(log_id) ON DELETE CASCADE,
          link_order INTEGER NOT NULL,
          PRIMARY KEY (thread_id, log_id)
      )
  - name: export_patch_sets
    sql: |
      CREATE TABLE IF NOT EXISTS export_patch_sets (
          patch_set_id TEXT PRIMARY KEY,
          artifact_kind TEXT NOT NULL CHECK (artifact_kind IN ('marked_manuscript', 'clean_manuscript')),
          source_root TEXT NOT NULL DEFAULT '',
          output_root TEXT NOT NULL DEFAULT '',
          status TEXT NOT NULL CHECK (status IN ('pending', 'ready', 'exported'))
      )
  - name: export_patches
    sql: |
      CREATE TABLE IF NOT EXISTS export_patches (
          patch_set_id TEXT NOT NULL REFERENCES export_patch_sets(patch_set_id) ON DELETE CASCADE,
          patch_order INTEGER NOT NULL,
          comment_id TEXT NOT NULL REFERENCES atomic_comments(comment_id) ON DELETE CASCADE,
          action_order INTEGER NOT NULL,
          location_order INTEGER NOT NULL,
          target_file TEXT NOT NULL DEFAULT '',
          anchor_text TEXT NOT NULL DEFAULT '',
          operation TEXT NOT NULL CHECK (operation IN ('replace', 'insert_after', 'insert_before')),
          marked_text TEXT NOT NULL DEFAULT '',
          clean_text TEXT NOT NULL DEFAULT '',
          notes TEXT NOT NULL DEFAULT '',
          PRIMARY KEY (patch_set_id, patch_order)
      )
  - name: export_artifacts
    sql: |
      CREATE TABLE IF NOT EXISTS export_artifacts (
          artifact_name TEXT PRIMARY KEY CHECK (artifact_name IN ('working_manuscript', 'response_markdown', 'response_latex', 'latexdiff_manuscript')),
          artifact_status TEXT NOT NULL CHECK (artifact_status IN ('pending', 'ready', 'exported')),
          output_path TEXT NOT NULL DEFAULT ''
      )
  - name: workflow_state
    sql: |
      CREATE TABLE IF NOT EXISTS workflow_state (
          id INTEGER PRIMARY KEY CHECK (id = 1),
          current_stage TEXT NOT NULL CHECK (current_stage IN ('stage_1', 'stage_2', 'stage_3', 'stage_4', 'stage_5', 'stage_6')),
          stage_gate TEXT NOT NULL CHECK (stage_gate IN ('blocked', 'ready')),
          active_comment_id TEXT REFERENCES atomic_comments(comment_id) ON DELETE SET NULL,
          next_action TEXT NOT NULL
      )
  - name: workflow_pending_user_confirmations
    sql: |
      CREATE TABLE IF NOT EXISTS workflow_pending_user_confirmations (
          position INTEGER PRIMARY KEY,
          message TEXT NOT NULL
      )
  - name: workflow_global_blockers
    sql: |
      CREATE TABLE IF NOT EXISTS workflow_global_blockers (
          position INTEGER PRIMARY KEY,
          message TEXT NOT NULL
      )
  - name: resume_brief
    sql: |
      CREATE TABLE IF NOT EXISTS resume_brief (
          id INTEGER PRIMARY KEY CHECK (id = 1),
          resume_status TEXT NOT NULL CHECK (resume_status IN ('bootstrap', 'active', 'blocked', 'ready_to_resume', 'completed')),
          current_objective TEXT NOT NULL DEFAULT '',
          current_focus TEXT NOT NULL DEFAULT '',
          why_paused TEXT NOT NULL DEFAULT '',
          next_operator_action TEXT NOT NULL DEFAULT ''
      )
